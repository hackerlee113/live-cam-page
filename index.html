<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>即時影像整合頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .cam-box {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        iframe {
            width: 480px;
            height: 320px;
            border: none;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #0078D7;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>

    <h2>即時影像整合</h2>

    <div class="container">
        
        <!-- 攝影機1 -->
        <div class="cam-box">
            <iframe id="cam1" src="https://www.twipcam.com/cam/nwt-000020"></iframe>
            <br>
            <button onclick="reloadCam('cam1')">撥放</button>
        </div>

        <!-- 攝影機2 -->
        <div class="cam-box">
            <iframe id="cam2" src="https://www.twipcam.com/cam/tao-000150"></iframe>
            <br>
            <button onclick="reloadCam('cam2')">撥放</button>
        </div>

    </div>

    <script>
        function reloadCam(camId) {
            var iframe = document.getElementById(camId);
            iframe.src = iframe.src;
        }
    </script>

</body>
</html>
